{% extends 'base.html' %}

{% block content %}
<h2>Our Restaurants</h2>

<div class="row">
    {% for restaurant in restaurants %}
        <div class="col-md-4 mb-4">
            <div class="card p-3">
                <h4>{{ restaurant.name }}</h4>
                <p>{{ restaurant.description }}</p>
                <a href="{% url 'restaurant_detail' restaurant.id %}" class="btn btn-primary">
                    View Details
                </a>
            </div>
        </div>
    {% endfor %}
</div>

{% endblock %}
