{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width: 600px;">

    <h2 class="text-center mb-4 text-danger">Cancel Booking</h2>

    <div class="card shadow-sm p-4">

        <p class="text-center mb-3">
            Are you sure you want to cancel this booking?
        </p>

        <ul class="list-group mb-3">
            <li class="list-group-item"><strong>Restaurant:</strong> {{ booking.restaurant.name }}</li>
            <li class="list-group-item"><strong>Date:</strong> {{ booking.date }}</li>
            <li class="list-group-item"><strong>Time:</strong> {{ booking.time }}</li>
            <li class="list-group-item"><strong>Party Size:</strong> {{ booking.party_size }}</li>
        </ul>

        <form method="POST" class="text-center">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger w-100 mb-2">Yes, Cancel Booking</button>
        </form>

        <a href="{% url 'my_bookings' %}" class="btn btn-outline-secondary w-100">
            No, Go Back
        </a>

    </div>

</div>
{% endblock %}
